init_by_lua_block {
    package.path = '/etc/nginx/conf.d/common/lua/?.lua;' .. package.path

    h = require "helpers"

    ANTHROPIC_DOMAIN, ANTHROPIC_PATH_PREFIX = h.parse_base_url(h.env("ANTHROPIC_BASE_URL") or "api.anthropic.com")
    ANTHROPIC_API_KEY = h.env("ANTHROPIC_API_KEY")
    ANTHROPIC_AUTH_TOKEN = h.env("ANTHROPIC_AUTH_TOKEN")
    assert(ANTHROPIC_DOMAIN and ANTHROPIC_DOMAIN ~= "", "ANTHROPIC_BASE_URL resolved to an empty domain")

    OPENAI_DOMAIN, OPENAI_PATH_PREFIX = h.parse_base_url(h.env("OPENAI_BASE_URL") or "https://api.openai.com/v1")
    OPENAI_API_KEY = h.env("OPENAI_API_KEY")
    assert(OPENAI_DOMAIN and OPENAI_DOMAIN ~= "", "OPENAI_BASE_URL resolved to an empty domain")

    OPENROUTER_DOMAIN, OPENROUTER_PATH_PREFIX = h.parse_base_url(h.env("OPENROUTER_BASE_URL") or "https://openrouter.ai/api/v1")
    OPENROUTER_API_KEY = h.env("OPENROUTER_API_KEY")
    assert(OPENROUTER_DOMAIN and OPENROUTER_DOMAIN ~= "", "OPENROUTER_BASE_URL resolved to an empty domain")
}

server {
    include /etc/nginx/conf.d/common/server_common.conf;

    listen 10001;
    
    # Anthropic route: header injection
    location /anthropic-api {
        include /etc/nginx/conf.d/common/location_common.conf;

        set_by_lua_block $proxy_host { return ANTHROPIC_DOMAIN }
        rewrite_by_lua_block {
            h.rewrite_path_prefix("/anthropic-api", ANTHROPIC_PATH_PREFIX)
        }

        access_by_lua_block {
            -- Always set Host to match the upstream we're proxying to
            ngx.req.set_header("Host", ANTHROPIC_DOMAIN)

            -- Scrub any client-supplied auth headers before injecting ours

            ngx.req.clear_header("x-api-key")
            if ANTHROPIC_API_KEY and ANTHROPIC_API_KEY ~= "" then
                ngx.req.set_header("x-api-key", ANTHROPIC_API_KEY)
            end

            ngx.req.clear_header("Authorization")
            if ANTHROPIC_AUTH_TOKEN and ANTHROPIC_AUTH_TOKEN ~= "" then
                ngx.req.set_header("Authorization", "Bearer " .. ANTHROPIC_AUTH_TOKEN)
            end
        }
    }
}

