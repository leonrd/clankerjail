init_by_lua_block {
    package.path = '/etc/nginx/conf.d/common/lua/?.lua;' .. package.path

    h = require "helpers"

    ANTHROPIC_PARSED_URL = h.parse_url(h.env("ANTHROPIC_BASE_URL") or "api.anthropic.com")
    ANTHROPIC_API_KEY = h.env("ANTHROPIC_API_KEY")
    ANTHROPIC_AUTH_TOKEN = h.env("ANTHROPIC_AUTH_TOKEN")

    OPENAI_PARSED_URL = h.parse_url(h.env("OPENAI_BASE_URL") or "https://api.openai.com/v1")
    OPENAI_API_KEY = h.env("OPENAI_API_KEY")

    OPENROUTER_PARSED_URL = h.parse_url(h.env("OPENROUTER_BASE_URL") or "https://openrouter.ai/api/v1")
    OPENROUTER_API_KEY = h.env("OPENROUTER_API_KEY")
}

upstream host_llamacpp { server host.docker.internal:8033; }

server {
    include /etc/nginx/conf.d/common/server_common.conf;

    listen 10000;
    
    location /llama-cpp {

        proxy_pass http://host_llamacpp;

        proxy_read_timeout    300s;

        # Don't let nginx rewrite Location/Refresh headers from upstream
        proxy_redirect          off;

        # Forward the real client IP
        proxy_set_header        X-Real-IP        $remote_addr;
        proxy_set_header        X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # Streaming support (SSE / chunked responses)
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_buffering         off;
        proxy_cache             off;

        # If the HTTP headers contain more info than anticipated, those proxy buffers can get saturated 
        # and nginx will drop the request with the “upstream sent too big header while reading response header from upstream”
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        rewrite_by_lua_block {
            h.rewrite_path_prefix("/llama-cpp", "")
        }
    }
}

server {
    include /etc/nginx/conf.d/common/server_common.conf;

    listen 10001;
    
    # Anthropic route: header injection
    location /anthropic-api {
        include /etc/nginx/conf.d/common/location_common.conf;

        set_by_lua_block $proxy_host { return ANTHROPIC_PARSED_URL.host_and_port }
        rewrite_by_lua_block {
            h.rewrite_path_prefix("/anthropic-api", ANTHROPIC_PARSED_URL.path)
        }

        access_by_lua_block {
            -- Always set Host to match the upstream we're proxying to
            ngx.req.set_header("Host", ANTHROPIC_PARSED_URL.host)

            -- Scrub any client-supplied auth headers before injecting ours

            ngx.req.clear_header("x-api-key")
            if ANTHROPIC_API_KEY and ANTHROPIC_API_KEY ~= "" then
                ngx.req.set_header("x-api-key", ANTHROPIC_API_KEY)
            end

            ngx.req.clear_header("Authorization")
            if ANTHROPIC_AUTH_TOKEN and ANTHROPIC_AUTH_TOKEN ~= "" then
                ngx.req.set_header("Authorization", "Bearer " .. ANTHROPIC_AUTH_TOKEN)
            end
        }
    }
}

server {
    include /etc/nginx/conf.d/common/server_common.conf;

    listen 10002;

    # OpenAI route: header injection
    location /openai-api {
        include /etc/nginx/conf.d/common/location_common.conf;

        set_by_lua_block $proxy_host { return OPENAI_PARSED_URL.host_and_port }
