set $proxy_scheme     "https"; # default;
proxy_pass            $proxy_scheme://$proxy_host;
proxy_ssl_server_name on;
proxy_ssl_name        $proxy_host;
proxy_read_timeout    300s;

# Don't let nginx rewrite Location/Refresh headers from upstream
proxy_redirect          off;

# Forward the real client IP
proxy_set_header        X-Real-IP        $remote_addr;
proxy_set_header        X-Forwarded-For  $proxy_add_x_forwarded_for;
proxy_set_header        X-Forwarded-Proto $scheme;

# Streaming support (SSE / chunked responses)
proxy_http_version      1.1;
proxy_set_header        Connection "";
proxy_buffering         off;
proxy_cache             off;

# If the HTTP headers contain more info than anticipated, those proxy buffers can get saturated 
# and nginx will drop the request with the “upstream sent too big header while reading response header from upstream”
proxy_buffer_size          128k;
proxy_buffers              4 256k;
proxy_busy_buffers_size    256k;
